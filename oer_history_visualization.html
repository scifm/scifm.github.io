<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OER Screening Agent — Session Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f;
  --panel: #0d1220;
  --card: #131929;
  --card-hover: #192236;
  --border: #1e2d4a;
  --border-bright: #2d4370;
  --text: #d4e2f4;
  --text-muted: #6a84a8;
  --text-dim: #3d5070;
  --accent: #00c9ff;
  --accent-glow: rgba(0,201,255,0.12);
  --supervisor: #8b5cf6;
  --supervisor-bg: rgba(139,92,246,0.12);
  --agent: #10d9a0;
  --agent-bg: rgba(16,217,160,0.1);
  --system: #f59e0b;
  --completed: #22c55e;
  --pending: #6b7280;
  --new-key: #00c9ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* HEADER */
.header{background:linear-gradient(90deg,#0d1220 0%,#0a1535 50%,#0d1220 100%);border-bottom:1px solid var(--border-bright);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6;}
.header-title{display:flex;align-items:center;gap:12px;}
.header-logo{width:28px;height:28px;background:conic-gradient(from 180deg,var(--accent),var(--supervisor),var(--agent),var(--accent));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.header-text{font-size:14px;font-weight:600;letter-spacing:.05em;}
.header-text span{color:var(--accent);}
.header-meta{display:flex;gap:16px;align-items:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);}
.header-badge{padding:2px 8px;border-radius:3px;background:var(--accent-glow);border:1px solid var(--accent);color:var(--accent);font-size:9px;letter-spacing:.1em;}

/* LAYOUT — resizable via JS drag handles */
.main{display:flex;height:calc(100vh - 52px);overflow:hidden;position:relative;}
.drag-col{width:5px;flex-shrink:0;background:var(--border);cursor:col-resize;transition:background .15s;z-index:10;user-select:none;}
.drag-col:hover,.drag-col.dragging{background:var(--accent);}
.drag-row{height:5px;flex-shrink:0;background:var(--border);cursor:row-resize;transition:background .15s;z-index:10;user-select:none;}
.drag-row:hover,.drag-row.dragging{background:var(--accent);}

/* LEFT PANEL */
.left-panel{flex-shrink:0;width:420px;display:flex;flex-direction:column;overflow:hidden;background:var(--panel);}
/* RIGHT SIDE */
.right-side{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:200px;}
.panel-header{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.panel-title{font-size:10px;font-weight:600;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;}
.panel-controls{display:flex;gap:4px;}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:2px 7px;color:var(--text-muted);font-size:9px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;}
.ctrl-btn:hover{background:var(--card-hover);color:var(--text);}
.ctrl-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:3px 8px;color:var(--text);font-size:10px;font-family:'Outfit',sans-serif;width:120px;}
.search-box:focus{outline:1px solid var(--accent);}
.panel-filter-row{padding:5px 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}

.timeline{overflow-y:auto;flex:1;padding:6px;}
.timeline::-webkit-scrollbar{width:4px;}
.timeline::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}

/* STEP CARDS */
.step-card{position:relative;margin-bottom:5px;border-radius:7px;border:1px solid var(--border);background:var(--card);transition:border-color .15s;}
.step-card:hover{border-color:var(--border-bright);}
.step-card.active{border-color:var(--accent);background:var(--accent-glow);}
.step-card.hidden{display:none;}
.step-card.highlighted{border-color:#fbbf24;box-shadow:0 0 0 2px rgba(251,191,36,.15);}
.step-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--supervisor);}
.step-card.agent-oer::before{background:var(--agent);}

/* STEP HEADER (always visible, clickable for selection) */
.step-header-row{display:flex;align-items:flex-start;gap:8px;padding:9px 11px 7px 14px;cursor:pointer;}
.step-header-row:hover .step-title{color:var(--accent);}
.step-left{flex:1;min-width:0;}
.step-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.step-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);min-width:38px;}
.step-time{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);}
.agent-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;}
.badge-supervisor{background:rgba(139,92,246,.18);color:#a78bfa;border:1px solid rgba(139,92,246,.4);}
.badge-oer{background:rgba(16,217,160,.15);color:#34d399;border:1px solid rgba(16,217,160,.35);}
.cat-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;}
.cat-planning{background:rgba(96,165,250,.15);color:#60a5fa;}
.cat-execution{background:rgba(52,211,153,.12);color:#34d399;}
.cat-data{background:rgba(251,191,36,.12);color:#fbbf24;}
.cat-literature{background:rgba(196,181,253,.12);color:#c4b5fd;}
.cat-dft{background:rgba(253,186,116,.12);color:#fdba74;}
.cat-results{background:rgba(125,211,252,.12);color:#7dd3fc;}
.cat-documentation{background:rgba(209,213,219,.1);color:#d1d5db;}
.step-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;}
.step-summary-text{font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:3px;}

/* EXPAND BUTTON */
.expand-toggle{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1;transition:transform .2s;margin-top:2px;}
.step-card.open .expand-toggle{transform:rotate(180deg);}

/* STEP BODY (expanded detail) */
.step-body{display:none;border-top:1px solid var(--border);background:#0a1020;padding:10px 14px;}
.step-card.open .step-body{display:block;}
.tool-section{margin-bottom:10px;}
.tool-section h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px;}
.tool-call{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:11px;font-family:'Space Mono',monospace;margin-bottom:4px;line-height:1.5;}
.tool-name{color:#fbbf24;font-weight:700;}
.tool-arg{color:#a5b4fc;}
.tool-response{background:#06111f;border:1px solid #1e3a5f;border-left:3px solid var(--accent);border-radius:5px;padding:7px 9px;font-size:10px;font-family:'Space Mono',monospace;color:#93c5fd;margin-top:4px;white-space:pre-wrap;max-height:180px;overflow-y:auto;line-height:1.55;}
.tool-response::-webkit-scrollbar{width:3px;}
.tool-response::-webkit-scrollbar-thumb{background:var(--border-bright);}
.full-details{margin-top:8px;}
.full-details summary{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600;padding:3px 0;}
.full-details summary:hover{text-decoration:underline;}
.full-details-content{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:9px;margin-top:6px;font-size:11px;color:var(--text-muted);line-height:1.7;max-height:280px;overflow-y:auto;}
.full-details-content::-webkit-scrollbar{width:3px;}
.full-details-content::-webkit-scrollbar-thumb{background:var(--border-bright);}

/* PHASE HEADERS */
.phase-header{display:flex;align-items:center;gap:8px;margin:8px 0 4px 6px;padding-bottom:5px;border-bottom:1px solid;}
.phase-header h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.phase-planning{border-color:rgba(96,165,250,.4);} .phase-planning h3{color:#60a5fa;}
.phase-filtering{border-color:rgba(251,191,36,.4);} .phase-filtering h3{color:#fbbf24;}
.phase-selection{border-color:rgba(167,139,250,.4);} .phase-selection h3{color:#a78bfa;}
.phase-bulk{border-color:rgba(52,211,153,.4);} .phase-bulk h3{color:#34d399;}
.phase-surface{border-color:rgba(251,146,60,.4);} .phase-surface h3{color:#fb923c;}
.phase-adsorption{border-color:rgba(244,63,94,.4);} .phase-adsorption h3{color:#f43f5e;}
.phase-analysis{border-color:rgba(34,211,238,.4);} .phase-analysis h3{color:#22d3ee;}

/* RIGHT PANELS */
.right-panels{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:200px;}
.right-panel{display:flex;flex-direction:column;overflow:hidden;min-height:80px;}
.right-panel.rp-top{flex-shrink:0;}
.right-panel.rp-bottom{flex:1;}
.rpanel-header{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--panel);}
.rpanel-title{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.rpanel-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.icon-canvas{background:rgba(236,72,153,.2);color:#f472b6;}
.icon-explog{background:rgba(99,102,241,.2);color:#818cf8;}
.rpanel-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);}
.rpanel-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px;}
.rpanel-content::-webkit-scrollbar{width:4px;}
.rpanel-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* CANVAS */
.canvas-empty{text-align:center;padding:30px;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:11px;}
.canvas-key{margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .2s;}
.canvas-key.key-new{border-color:var(--new-key);box-shadow:0 0 12px rgba(0,201,255,.1);animation:keyPulse .8s ease;}
@keyframes keyPulse{0%{box-shadow:0 0 0 rgba(0,201,255,0);}50%{box-shadow:0 0 20px rgba(0,201,255,.3);}100%{box-shadow:0 0 12px rgba(0,201,255,.1);}}
.ck-header{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--card);cursor:pointer;user-select:none;}
.ck-header:hover{background:var(--card-hover);}
.ck-name{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);font-weight:700;}
.ck-right{display:flex;align-items:center;gap:6px;}
.new-badge{padding:1px 5px;border-radius:2px;font-size:8px;font-weight:700;background:var(--accent);color:var(--bg);letter-spacing:.1em;}
.ck-expand{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.ck-expand.open{transform:rotate(180deg);}
.ck-content{display:none;padding:8px 11px;border-top:1px solid var(--border);background:var(--bg);font-family:'Space Mono',monospace;font-size:9.5px;color:var(--text-muted);white-space:pre-wrap;max-height:200px;overflow-y:auto;line-height:1.6;}
.ck-content.open{display:block;}
.ck-content::-webkit-scrollbar{width:3px;}
.ck-content::-webkit-scrollbar-thumb{background:var(--border);}

/* EXPLOG */
.explog-tabs{display:flex;gap:2px;padding:6px 14px 0;background:var(--panel);flex-shrink:0;border-bottom:1px solid var(--border);}
.explog-tab{padding:4px 12px;font-size:10px;font-weight:500;cursor:pointer;border-radius:4px 4px 0 0;border:1px solid transparent;border-bottom:none;color:var(--text-muted);transition:all .15s;margin-bottom:-1px;}
.explog-tab.active{border-color:var(--border-bright);background:var(--bg);color:var(--text);border-bottom-color:var(--bg);}
.explog-tab:hover:not(.active){color:var(--text);}
.explog-table-wrap{overflow-x:auto;overflow-y:auto;flex:1;}
.explog-table-wrap::-webkit-scrollbar{height:4px;width:4px;}
.explog-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
table{width:100%;border-collapse:collapse;font-size:10px;}
th{padding:6px 9px;text-align:left;font-family:'Space Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.07em;color:var(--text-dim);background:var(--card);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1;}
td{padding:5px 9px;border-bottom:1px solid rgba(30,45,74,.5);font-family:'Space Mono',monospace;font-size:9.5px;color:var(--text-muted);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text);}
.status-completed{display:inline-block;padding:1px 5px;border-radius:2px;background:rgba(34,197,94,.12);color:#22c55e;font-size:8.5px;font-weight:600;}
.status-running{display:inline-block;padding:1px 5px;border-radius:2px;background:rgba(245,158,11,.12);color:#f59e0b;font-size:8.5px;font-weight:600;}
.status-pending{display:inline-block;padding:1px 5px;border-radius:2px;background:rgba(107,114,128,.12);color:#6b7280;font-size:8.5px;}
.jt-bulk{color:#60a5fa;} .jt-surface{color:#c084fc;} .jt-ads{color:#34d399;}
.op-bar{display:flex;align-items:center;gap:5px;}
.op-val{font-weight:700;min-width:36px;}
.op-track{width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.op-fill{height:100%;border-radius:2px;}
.empty-state{padding:24px;text-align:center;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:10px;}
.explog-sub-header{padding:6px 10px;display:flex;gap:8px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.stat-chip{padding:2px 7px;border-radius:3px;font-family:'Space Mono',monospace;font-size:9px;background:var(--card);color:var(--text-muted);border:1px solid var(--border);}
.stat-chip strong{color:var(--text);}
td.note-cell{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="header-logo">⚗</div>
    <div><div class="header-text">OER Screening Agent — <span>Session Replay</span></div></div>
  </div>
  <div class="header-meta">
    <span>2026-02-19 · 17:10:33 → 18:00:07</span>
    <span class="header-badge">VASP · DFT · ACIDIC OER</span>
    <span>15 candidates · 51 calcs · 16 steps</span>
  </div>
</div>

<div class="main" id="mainLayout">

<!-- LEFT PANEL -->
<div class="left-panel" id="leftPanel">
  <div class="panel-header">
    <div class="panel-title">▶ Agent Log</div>
    <div class="panel-controls">
      <button class="ctrl-btn active" id="btn-sup" onclick="toggleAgentFilter('supervisor',this)">SUP</button>
      <button class="ctrl-btn active" id="btn-oer" onclick="toggleAgentFilter('oer',this)">OER</button>
      <button class="ctrl-btn" onclick="expandAllCards()">⬇ All</button>
      <button class="ctrl-btn" onclick="collapseAllCards()">⬆ All</button>
    </div>
  </div>
  <div class="panel-filter-row">
    <span style="font-size:9px;color:var(--text-dim);align-self:center;">CAT:</span>
    <button class="ctrl-btn active" onclick="toggleCatFilter('planning',this)">📋 Plan</button>
    <button class="ctrl-btn active" onclick="toggleCatFilter('data',this)">📊 Data</button>
    <button class="ctrl-btn active" onclick="toggleCatFilter('literature',this)">📚 Lit</button>
    <button class="ctrl-btn active" onclick="toggleCatFilter('dft',this)">⚡ DFT</button>
    <button class="ctrl-btn active" onclick="toggleCatFilter('results',this)">🔬 Results</button>
    <button class="ctrl-btn active" onclick="toggleCatFilter('documentation',this)">📝 Docs</button>
    <input class="search-box" placeholder="🔍 Search…" oninput="doSearch(this.value)">
  </div>
  <div class="timeline" id="timeline"></div>
</div>
<div class="drag-col" id="dragCol" title="Drag to resize left panel"></div>

<!-- RIGHT PANELS -->
<div class="right-panels" id="rightPanels">
  <div class="right-panel rp-top" id="panelCanvas" style="height:50%;">
    <div class="rpanel-header">
      <div class="rpanel-title"><div class="rpanel-icon icon-canvas">📋</div>CANVAS STATE</div>
      <div class="rpanel-meta" id="canvasMeta">0 keys</div>
    </div>
    <div class="rpanel-content" id="canvasContent">
      <div class="canvas-empty">[ CANVAS EMPTY ]<br>No entries yet.</div>
    </div>
  </div>
  <div class="drag-row" id="dragRow" title="Drag to resize panels"></div>
  <div class="right-panel rp-bottom" id="panelExplog">
    <div class="rpanel-header">
      <div class="rpanel-title"><div class="rpanel-icon icon-explog">🗂</div>EXPLOG STATE</div>
      <div class="rpanel-meta" id="explogMeta">0 candidates · 0 processes</div>
    </div>
    <div class="explog-tabs">
      <div class="explog-tab active" id="tabC" onclick="switchTab('candidates')">Candidates</div>
      <div class="explog-tab" id="tabP" onclick="switchTab('processes')">Processes</div>
    </div>
    <div id="explogContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="empty-state">No candidates submitted yet.</div>
    </div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CANDIDATES & PROCESSES DATA (from EXPLOG CSVs)
// ═══════════════════════════════════════════════════════
const CANDIDATES = [
  {id:'f99f34ee94',comp:'IrPdO4',nsites:6,bandgap:0.0049,disorder:0.121,crystal:'orthorhombic',active:['Ir','Pd'],op:null,reason:'Ir is the benchmark OER champion metal; IrPdO4 is the smallest system (6 atoms) with near-metallic character. Hypothesis: Ir-Pd synergy may outperform pure IrO2 via d-band mixing.',note:'Noble metal oxide IrPdO4 with Ir (known OER champion) and Pd. Smallest system (6 atoms), near-metallic (bandgap 0.0049 eV), 3D orthorhombic structure, low disorder probability (0.121).'},
  {id:'2b3cd20212',comp:'CoHgTeO6',nsites:9,bandgap:0.0117,disorder:0.015,crystal:'trigonal',active:['Co'],op:null,reason:'Co is a literature-proven OER-active element (Co3O4, LaCoO3). Very low disorder (0.015) and near-metallic. Hypothesis: trigonal Co-oxide framework may stabilize Co3+/Co4+ redox for favorable O binding.',note:'Co-based oxide CoHgTeO6 with Co (literature-proven OER-active element). Near-metallic (bandgap 0.0117 eV), very low disorder probability (0.015), 3D trigonal structure.'},
  {id:'2787f43669',comp:'NiPbIO6',nsites:9,bandgap:0.0182,disorder:0.009,crystal:'trigonal',active:['Ni'],op:null,reason:'Ni eg¹ orbital occupancy is known to produce near-optimal O binding energy. Extremely low disorder (0.009). Hypothesis: Ni in trigonal oxide framework will place G(O*) near volcano optimum (2.46 eV).',note:'Ni-based oxide NiPbIO6 with Ni (proven in Co-Ni OER combinations). Near-metallic (bandgap 0.0182 eV), extremely low disorder probability (0.009), 3D trigonal structure.'},
  {id:'5e5c060528',comp:'KAg(HgO2)₂',nsites:8,bandgap:0.5646,disorder:0.052,crystal:'triclinic',active:['Ag'],op:null,reason:'Ag has d¹⁰ electronic configuration providing high conductivity. Literature identifies Ag-based oxides as high-performance OER candidates. Hypothesis: Ag-O bond strength in this framework may be tunable.',note:'Ag-based oxide KAg(HgO2)2 with Ag (literature-identified high-performance element). Small system (8 atoms), metallic (bandgap 0.5646 eV), low disorder probability (0.052), 3D triclinic structure.'},
  {id:'2730bcba45',comp:'InCoAsO6',nsites:9,bandgap:0.510,disorder:0.050,crystal:'trigonal',active:['Co'],op:null,reason:'Co is highest-activity element from literature screening. As may provide p-d hybridization to tune Co binding energy. Hypothesis: Co-As interaction modifies eg occupancy toward OER optimum.',note:'Co-based oxide InCoAsO6 with Co and As. Metallic (bandgap 0.5104 eV), very low disorder probability (0.050), 3D trigonal structure. Co is highest-activity element from literature.'},

3. Optimize Gibbs free energy to 2.46 ± 0.1 eV for minimal overpotential
4. Prioritize fluoride &gt; sulfate &gt; oxide ligand environments
5. Consider Ni-based oxides for balanced performance and practicality

All objectives achieved within computational budget constraints.
Full report documented on CANVAS under 'FINAL_COMPREHENSIVE_OER_REPORT'.</div></details></div>`
}
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let activeStep = 0;
let activeTab = 'candidates';
const agentFilter = {supervisor:true, oer:true};
const catFilter = {planning:true,data:true,literature:true,dft:true,results:true,documentation:true};

// ═══════════════════════════════════════════════════════
// RENDER TIMELINE
// ═══════════════════════════════════════════════════════
function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const phases = [
    {id:'planning',   label:'📋 Phase 1 — Planning',        cls:'phase-planning',   steps:[0,1]},
    {id:'filtering',  label:'🔍 Phase 2 — Data Filtering',  cls:'phase-filtering',  steps:[2,3,4]},
    {id:'selection',  label:'🎯 Phase 3 — Candidate Selection', cls:'phase-selection', steps:[5]},
    {id:'bulk',       label:'⚙️ Phase 4 — Bulk Calculations', cls:'phase-bulk',     steps:[6,7]},
    {id:'surface',    label:'🔬 Phase 5 — Surface Analysis',  cls:'phase-surface',  steps:[8,9]},
    {id:'adsorption', label:'⚡ Phase 6 — O Adsorption',      cls:'phase-adsorption',steps:[10,11]},
    {id:'analysis',   label:'📊 Phase 7 — Final Analysis',    cls:'phase-analysis', steps:[12,13,14,15]},
  ];

  phases.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = `phase-header ${phase.cls}`;
    ph.innerHTML = `<h3>${phase.label}</h3>`;
    tl.appendChild(ph);

    phase.steps.forEach(si => {
      const s = STEPS[si];
      const card = document.createElement('div');
      card.className = `step-card agent-${s.agent} ${si===activeStep?'active':''} ${!agentFilter[s.agent]||!catFilter[s.cat]?'hidden':''}`;
      card.id = `step-${si}`;
      card.innerHTML = `
        <div class="step-header-row" onclick="selectStep(${si})">
          <div class="step-left">
            <div class="step-meta">
              <span class="step-num">${s.num}</span>
              <span class="step-time">${s.time}</span>
              <span class="agent-badge badge-${s.agent}">${s.agent==='supervisor'?'👤 Supervisor':'🤖 OER_Agent'}</span>
              <span class="cat-badge cat-${s.cat}">${s.cat}</span>
            </div>
            <div class="step-title">${s.title}</div>
            <div class="step-summary-text">${s.summary}</div>
          </div>
          <button class="expand-toggle" onclick="event.stopPropagation();toggleBody(${si},this)">▼</button>
        </div>
        <div class="step-body" id="body-${si}">${s.body}</div>
      `;
      tl.appendChild(card);
    });
  });
}

function toggleBody(idx, btn) {
  const card = document.getElementById(`step-${idx}`);
  card.classList.toggle('open');
}

function selectStep(idx) {
  activeStep = idx;
  document.querySelectorAll('.step-card').forEach((c,i) => {
    c.classList.toggle('active', i === idx || c.id === `step-${idx}`);
  });
  document.querySelectorAll('.step-card').forEach(c => {
    c.classList.remove('active');
  });
  document.getElementById(`step-${idx}`)?.classList.add('active');
  renderCanvas(idx);
  renderExplog(idx);
  document.getElementById(`step-${idx}`)?.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ═══════════════════════════════════════════════════════
// CANVAS RENDER
// ═══════════════════════════════════════════════════════
function renderCanvas(stepIdx) {
  const keys = CANVAS_STATES[stepIdx];
  const prevKeys = stepIdx > 0 ? CANVAS_STATES[stepIdx-1] : [];
  const content = document.getElementById('canvasContent');
  const meta = document.getElementById('canvasMeta');
  meta.textContent = `${keys.length} key${keys.length!==1?'s':''} stored`;
  if (keys.length===0) {
    content.innerHTML = '<div class="canvas-empty">[ CANVAS EMPTY ]<br>No entries written yet.</div>';
    return;
  }
  content.innerHTML = keys.map((k,i) => {
    const isNew = !prevKeys.includes(k);
    const previewText = (ALL_CANVAS_KEYS[k]||'(content)').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="canvas-key ${isNew?'key-new':''}">
      <div class="ck-header" onclick="toggleCK(${i})">
        <span class="ck-name">${k}</span>
        <span class="ck-right">
          ${isNew?'<span class="new-badge">NEW</span>':''}
          <span class="ck-expand" id="ckx-${i}">▼</span>
        </span>
      </div>
      <div class="ck-content" id="ckc-${i}">${previewText}</div>
    </div>`;
  }).join('');
}

function toggleCK(i) {
  const c = document.getElementById(`ckc-${i}`);
  const x = document.getElementById(`ckx-${i}`);
  c.classList.toggle('open');
  x.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// EXPLOG RENDER
// ═══════════════════════════════════════════════════════
function renderExplog(stepIdx) {
  const es = EXPLOG_STATES[stepIdx];
  document.getElementById('explogMeta').textContent = `${es.nc} candidates · ${es.np} processes`;
  if (activeTab==='candidates') renderCandidates(es);
  else renderProcesses(es);
}

function renderCandidates(es) {
  const el = document.getElementById('explogContent');
  if (es.nc===0) { el.innerHTML='<div class="empty-state">[ EXPLOG EMPTY ]<br>No candidates submitted yet.</div>'; return; }
  const cands = CANDIDATES.slice(0,es.nc);
  const adsDone = es.ads==='completed';
  const rows = cands.map(c => {
    let opCell = '<span style="color:var(--text-dim)">—</span>';
    if (adsDone && c.op!==null) {
      const pct = Math.min(100,(c.op/1.5)*100);
      const col = c.op<0.2?'#00e5a0':c.op<0.6?'#f59e0b':'#ef4444';
      opCell = `<div class="op-bar"><span class="op-val" style="color:${col}">${c.op.toFixed(2)}V</span><div class="op-track"><div class="op-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
    }
    const tags = c.active.map(e=>`<span style="background:rgba(99,202,255,.1);color:#67e8f9;padding:1px 4px;border-radius:2px;font-size:8.5px;margin-right:2px;">${e}</span>`).join('');
    const reasonEsc = c.reason.replace(/"/g,'&quot;');
    return `<tr>
      <td style="font-weight:600;color:var(--text);white-space:nowrap">${c.comp}</td>
      <td style="color:var(--text-dim);white-space:nowrap">${c.id.slice(0,8)}</td>
      <td>${c.nsites}</td>
      <td>${c.bandgap.toFixed(4)}</td>
      <td>${c.disorder.toFixed(3)}</td>
      <td style="white-space:nowrap">${tags}</td>
      <td>${opCell}</td>
      <td style="min-width:260px;max-width:360px;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:10px;line-height:1.5;white-space:normal;">${c.reason}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="explog-table-wrap">
    <table><thead><tr><th>COMPOSITION</th><th>ID (8)</th><th>N</th><th>BANDGAP</th><th>DISORDER</th><th>ACTIVE</th><th>η (V)</th><th>REASON / HYPOTHESIS</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function renderProcesses(es) {
  const el = document.getElementById('explogContent');
  if (es.np===0) { el.innerHTML='<div class="empty-state">No processes submitted yet.</div>'; return; }
  const procs = PROCESSES.slice(0,es.np);
  const getStatus = p => {
    if(p.type==='bulk_relaxation') return es.bulk||'pending';
    if(p.type==='surface_relaxation') return es.surf||'pending';
    if(p.type==='O_adsorption') return es.ads||'running';
    return 'pending';
  };
  const tc = procs.filter(p=>p.type==='bulk_relaxation').length;
  const ts = procs.filter(p=>p.type==='surface_relaxation').length;
  const ta = procs.filter(p=>p.type==='O_adsorption').length;
  const compOf = id => { const c=CANDIDATES.find(x=>x.id===id); return c?c.comp:id.slice(0,8); };
  const rows = procs.map(p=>{
    const st = getStatus(p);
    const badge = `<span class="status-${st}">${st.toUpperCase()}</span>`;
    const tc = p.type==='bulk_relaxation'?'jt-bulk':p.type==='surface_relaxation'?'jt-surface':'jt-ads';
    const typeS = p.type==='bulk_relaxation'?'BULK':p.type==='surface_relaxation'?'SURFACE':'O-ADS';
    const termS = p.term!==null?`t=${p.term}`:'—';
    const siteS = p.site!==null?`s=${p.site}`:'—';
    return `<tr><td>${p.id}</td>
      <td style="font-weight:500;color:var(--text)">${compOf(p.cid)}</td>
      <td><span class="${tc}">${typeS}</span></td>
      <td>${p.slurm}</td>
      <td>${termS}</td><td>${siteS}</td>
      <td>${badge}</td>
      <td class="note-cell" title="${p.note.replace(/"/g,'&quot;')}" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.note}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="explog-sub-header">
    <div class="stat-chip"><strong style="color:#60a5fa;">${tc}</strong> bulk</div>
    <div class="stat-chip"><strong style="color:#c084fc;">${ts}</strong> surface</div>
    <div class="stat-chip"><strong style="color:#34d399;">${ta}</strong> O-ads</div>
    <div class="stat-chip">VASP · SLURM</div>
  </div>
  <div class="explog-table-wrap" style="flex:1;overflow:auto;">
    <table><thead><tr><th>#</th><th>MATERIAL</th><th>TYPE</th><th>SLURM</th><th>TERM</th><th>SITE</th><th>STATUS</th><th>NOTE (hover for full)</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function switchTab(tab) {
  activeTab=tab;
  document.getElementById('tabC').className='explog-tab'+(tab==='candidates'?' active':'');
  document.getElementById('tabP').className='explog-tab'+(tab==='processes'?' active':'');
  renderExplog(activeStep);
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function toggleAgentFilter(ag, btn) {
  agentFilter[ag] = !agentFilter[ag];
  btn.classList.toggle('active', agentFilter[ag]);
  applyFilters();
}
function toggleCatFilter(cat, btn) {
  catFilter[cat] = !catFilter[cat];
  btn.classList.toggle('active', catFilter[cat]);
  applyFilters();
}
function applyFilters() {
  const search = (document.querySelector('.search-box').value||'').toLowerCase();
  document.querySelectorAll('.step-card').forEach(card => {
    const s = STEPS[parseInt(card.id.replace('step-',''))];
    if(!s) return;
    const agOk = agentFilter[s.agent];
    const catOk = catFilter[s.cat];
    const searchOk = !search || card.textContent.toLowerCase().includes(search);
    card.classList.toggle('hidden', !agOk||!catOk||!searchOk);
    if(!agOk||!catOk||!searchOk) card.classList.remove('highlighted');
    else if(search) card.classList.add('highlighted');
    else card.classList.remove('highlighted');
  });
}
function doSearch(val) {
  const v = val.toLowerCase();
  document.querySelectorAll('.step-card').forEach(card => {
    const s = STEPS[parseInt(card.id.replace('step-',''))];
    if(!s) return;
    const agOk = agentFilter[s.agent];
    const catOk = catFilter[s.cat];
    const match = !v || card.textContent.toLowerCase().includes(v);
    card.classList.toggle('hidden', !agOk||!catOk||!match);
    card.classList.toggle('highlighted', !!v && match && agOk && catOk);
  });
}
function expandAllCards() {
  document.querySelectorAll('.step-card').forEach(c=>c.classList.add('open'));
}
function collapseAllCards() {
  document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('open'));
}

// ═══════════════════════════════════════════════════════
// RESIZABLE PANELS
// ═══════════════════════════════════════════════════════
(function() {
  // ── Column (left ↔ right) drag ──────────────────────
  const dragCol = document.getElementById('dragCol');
  const leftPanel = document.getElementById('leftPanel');
  const mainLayout = document.getElementById('mainLayout');
  let colDragging = false, colStartX = 0, colStartW = 0;

  dragCol.addEventListener('mousedown', e => {
    colDragging = true;
    colStartX = e.clientX;
    colStartW = leftPanel.getBoundingClientRect().width;
    dragCol.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  // ── Row (canvas ↔ explog) drag ───────────────────────
  const dragRow = document.getElementById('dragRow');
  const panelCanvas = document.getElementById('panelCanvas');
  const rightPanels = document.getElementById('rightPanels');
  let rowDragging = false, rowStartY = 0, rowStartH = 0;

  dragRow.addEventListener('mousedown', e => {
    rowDragging = true;
    rowStartY = e.clientY;
    rowStartH = panelCanvas.getBoundingClientRect().height;
    dragRow.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  // ── Shared mousemove + mouseup ───────────────────────
  document.addEventListener('mousemove', e => {
    if (colDragging) {
      const newW = Math.max(240, Math.min(colStartW + (e.clientX - colStartX), mainLayout.clientWidth - 300));
      leftPanel.style.width = newW + 'px';
    }
    if (rowDragging) {
      const totalH = rightPanels.clientHeight;
      const newH = Math.max(80, Math.min(rowStartH + (e.clientY - rowStartY), totalH - 80 - dragRow.offsetHeight));
      panelCanvas.style.height = newH + 'px';
      panelCanvas.style.flexShrink = '0';
    }
  });

  document.addEventListener('mouseup', () => {
    if (colDragging) { colDragging = false; dragCol.classList.remove('dragging'); }
    if (rowDragging) { rowDragging = false; dragRow.classList.remove('dragging'); }
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// INIT
renderTimeline();
selectStep(0);
document.querySelectorAll('.ctrl-btn[onclick*="toggleAgentFilter"], .ctrl-btn[onclick*="toggleCatFilter"]').forEach(b=>b.classList.add('active'));
</script>
</body>
</html>
